<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriFlow</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <link rel="stylesheet" href="styles/main.css">

  
</head>

<body>

  <div id="app">
    <header class="welcome-banner">
      <h1>Welcome to NutriFlow</h1>
      <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=80&q=80">
    </header>

    <input type="text" id="search" placeholder="Rechercher une recette...">

    <section class="recipe-list"></section>
  </div>

  <!-- Navbar -->
  <nav id="nav-bar">
    <button><i class="fa-solid fa-house"></i></button>
    <button><i class="fa-solid fa-comment"></i></button>
    <button><i class="fa-solid fa-heart"></i></button>
  </nav>

  <!-- Modal -->
  <div id="recipe-modal" class="modal hidden">
    <div class="modal-content">
      <span id="close-modal">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>

</body>
</html>

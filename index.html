<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriFlow</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding-bottom: 80px;
      background-color: #fff;
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hidden {
      display: none;
    }

    .modal-content {
      background: white;
      width: 90%;
      max-height: 80%;
      overflow-y: auto;
      border-radius: 15px;
      padding: 20px;
      position: relative;
    }

    #close-modal {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 1.5rem;
      cursor: pointer;
    }

    /* Welcome banner */
    .welcome-banner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #fff9b0;
      padding: 10px 15px;
      border-radius: 15px;
      margin: 10px;
    }

    .welcome-banner h1 {
      font-size: 1.2rem;
      font-weight: 600;
      margin: 0;
    }

    .welcome-banner img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 15px;
    }

    /* Search */
    #search {
      display: block;
      width: 90%;
      margin: 10px auto;
      padding: 10px;
      font-size: 1rem;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    /* Recipe cards */
    .recipe-list {
      margin: 10px;
    }

    .recipe-card {
      background-color: #dfffbb;
      border-radius: 15px;
      margin-bottom: 15px;
      padding: 10px;
      display: flex;
      align-items: center;
      position: relative;
      cursor: pointer;
    }

    .recipe-card img {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 15px;
    }


    
    .info {
      flex-grow: 1;
      margin-left: 15px;
    }

    .info h3 {
      margin: 0 0 5px 0;
      font-size: 1rem;
      font-weight: 600;
    }

    .calories {
      position: absolute;
      bottom: 10px;
      left: 10px;
      padding: 4px 10px;
      border-radius: 15px;
      font-weight: 600;
      font-size: 0.8rem;
      color: white;
    }

    .calories.green { background-color: #4CAF50; }
    .calories.orange { background-color: #FF9800; }
    .calories.red { background-color: #F44336; }

    /* Loader */
    .loader {
      font-weight: bold;
      text-align: center;
      padding: 20px;
      font-size: 1.2rem;
      color: #333;
    }

    /* Navbar */
    #nav-bar {
      position: fixed;
      bottom: 0;
      left: 10px;
      right: 10px;
      background-color: #c4bbff;
      padding: 10px 0;
      display: flex;
      justify-content: space-around;
      border-radius: 15px 15px 0 0;
      box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
      z-index: 1000;
    }

    #nav-bar button {
      background: none;
      border: none;
      font-size: 2rem;
      cursor: pointer;
      transition: transform 0.2s;
    }

    #nav-bar button:hover {
      transform: scale(1.2);
    }
  </style>
</head>

<body>

  <div id="app">
    <header class="welcome-banner">
      <h1>Welcome to NutriFlow</h1>
      <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=80&q=80" alt="Food">
    </header>

    <input type="text" id="search" placeholder="Rechercher une recette...">

    <section class="recipe-list"></section>
  </div>

  <!-- Navbar -->
  <nav id="nav-bar">
    <button id="nav-home"><i class="fa-solid fa-house"></i></button>
    <button id="nav-messages"><i class="fa-solid fa-comment"></i></button>
    <button id="nav-favorites"><i class="fa-solid fa-heart"></i></button>
  </nav>

  <!-- Modal -->
  <div id="recipe-modal" class="modal hidden">
    <div class="modal-content">
      <span id="close-modal">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriFlow</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
  




  
  <style>
    
    .info {
      flex-grow: 1;
      margin-left: 15px;
    }

    .info h3 {
      margin: 0 0 5px 0;
      font-size: 1rem;
      font-weight: 600;
    }

    .calories {
      position: absolute;
      bottom: 10px;
      left: 10px;
      padding: 4px 10px;
      border-radius: 15px;
      font-weight: 600;
      font-size: 0.8rem;
      color: white;
    }

    .calories.green { background-color: #4CAF50; }
    .calories.orange { background-color: #FF9800; }
    .calories.red { background-color: #F44336; }

    /* Loader */
    .loader {
      font-weight: bold;
      text-align: center;
      padding: 20px;
      font-size: 1.2rem;
      color: #333;
    }

    /* Navbar */
    #nav-bar {
      position: fixed;
      bottom: 0;
      left: 10px;
      right: 10px;
      background-color: #c4bbff;
      padding: 10px 0;
      display: flex;
      justify-content: space-around;
      border-radius: 15px 15px 0 0;
      box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
      z-index: 1000;
    }

    #nav-bar button {
      background: none;
      border: none;
      font-size: 2rem;
      cursor: pointer;
      transition: transform 0.2s;
    }

    #nav-bar button:hover {
      transform: scale(1.2);
    }
  </style>
</head>

<body>

  <div id="app">
    <header class="welcome-banner">
      <h1>Welcome to NutriFlow</h1>
      <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=80&q=80" alt="Food">
    </header>

    <input type="text" id="search" placeholder="Rechercher une recette...">

    <section class="recipe-list"></section>
  </div>

  

  <script type="module" src="./src/main.js"></script>

</body>
</html>
